framework:
    messenger:
        failure_transport: failed

        transports:
            async: '%env(MESSENGER_TRANSPORT_DSN)%'
            failed: 'doctrine://default?queue_name=failed'
            sync: 'sync://'

        routing:
            'App\Message\CsvFileProcessingMessage': async
            'App\Message\MultiCsvFileProcessingMessage': async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
