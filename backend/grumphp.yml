grumphp:
    hooks_dir: ~
    hooks_preset: local
    git_hook_variables:
        EXEC_GRUMPHP_COMMAND: 'docker compose exec -T php'
    ignore_unstaged_changes: false
    stop_on_failure: false
    ascii:
        succeeded: ~
        failed: ~
    fixer:
        enabled: true
        fix_by_default: true
    tasks:
        phpstan:
            autoload_file: ~
            configuration: phpstan.dist.neon
            level: max
            memory_limit: "-1"
            use_grumphp_paths: false
            triggered_by: ['php']
        phpcs:
            standard: phpcs.xml.dist
            triggered_by: ['php']
            whitelist_patterns:
                - /^src\/.*/
                - /^tests\/.*/
#        phpmd:
#            ruleset: ['phpmd.xml']
#            triggered_by: ['php']
#            exclude:
#                - 'vendor'
#                - 'var'
#                - 'public'
#                - 'migrations'
        rector:
            config: rector.php
            triggered_by: ['php']
