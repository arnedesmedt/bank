name: Build and push HA add-on image

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from add-on config
        id: version
        run: |
          VERSION=$(grep '^version:' bank/config.yaml | sed 's/version:[[:space:]]*//' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/arnedesmedt/bank:${{ steps.version.outputs.version }}
            ghcr.io/arnedesmedt/bank:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
