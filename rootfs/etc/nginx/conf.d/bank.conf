server {
    listen 8099 default_server;
    server_name _;

    # Allow large file uploads (CSV imports)
    client_max_body_size 100M;

    # Default root for Symfony PHP requests
    root /var/www/html/public;

    # ── PHP-FPM FastCGI handler (internal only) ────────────────────────────
    location ~ ^/index\.php(/|$) {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        fastcgi_buffer_size           128k;
        fastcgi_buffers               4 256k;
        fastcgi_busy_buffers_size     256k;
        fastcgi_read_timeout          300;
        internal;
    }

    # ── OAuth2 token endpoint ──────────────────────────────────────────────
    location = /token {
        try_files $uri /index.php$is_args$args;
    }

    # ── Symfony API (API Platform) ─────────────────────────────────────────
    location /api/ {
        try_files $uri /index.php$is_args$args;
    }

    # ── Static frontend assets (long-lived cache, gzip ok) ────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        root /var/www/frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── React SPA (catch-all) ──────────────────────────────────────────────
    # Injects the HA ingress base path so the app uses correct API and router
    # base URLs regardless of where HA mounts the ingress panel.
    location / {
        root /var/www/frontend;

        set $ingress_path "";
        if ($http_x_ingress_path) {
            set $ingress_path $http_x_ingress_path;
        }

        gzip off;
        sub_filter '<head>' '<head><base href="$ingress_path/"><script>window.__ingress_path__="$ingress_path";</script>';
        sub_filter_once on;
        add_header Cache-Control "no-store";

        try_files $uri $uri/ /index.html;
    }

    # Block direct PHP file access (Symfony routes everything via index.php)
    location ~ \.php$ {
        return 404;
    }
}
