server {
    listen 8099 default_server;
    server_name _;

    # Allow large file uploads (CSV imports)
    client_max_body_size 100M;

    # Default root for Symfony PHP requests
    root /var/www/html/public;

    # ── PHP-FPM FastCGI handler (internal only) ────────────────────────────
    location ~ ^/index\.php(/|$) {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        fastcgi_buffer_size           128k;
        fastcgi_buffers               4 256k;
        fastcgi_busy_buffers_size     256k;
        fastcgi_read_timeout          300;
        internal;
    }

    # ── OAuth2 token endpoint ──────────────────────────────────────────────
    location = /token {
        try_files $uri /index.php$is_args$args;
    }

    # ── Symfony API (API Platform) ─────────────────────────────────────────
    location /api/ {
        try_files $uri /index.php$is_args$args;
    }

    # ── React SPA (catch-all) ──────────────────────────────────────────────
    location / {
        root /var/www/frontend;
        try_files $uri $uri/ /index.html;

        # Long-lived cache for hashed static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Block direct PHP file access (Symfony routes everything via index.php)
    location ~ \.php$ {
        return 404;
    }
}
